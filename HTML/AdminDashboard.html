
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduResult - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        select { cursor: pointer; }
        .btn-hover { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn-hover:active { transform: scale(0.96); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-grow container mx-auto px-4 py-8 max-w-7xl fade-in">
        <div class="mb-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
            <div class="space-y-1">
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Control Panel</h1>
                <p class="text-sm text-slate-500 font-medium">System Administration & Data Management</p>
            </div>
            <div class="flex bg-slate-200/50 p-1.5 rounded-2xl backdrop-blur-sm self-start md:self-auto">
                <button id="tab-upload" class="px-8 py-2.5 rounded-xl font-black bg-white text-blue-600 shadow-xl shadow-slate-200/50 text-xs uppercase tracking-widest transition-all">Upload</button>
                <button id="tab-manage" class="px-8 py-2.5 rounded-xl font-black text-slate-500 hover:text-slate-800 text-xs uppercase tracking-widest transition-all">Manage</button>
            </div>
        </div>

        <!-- Upload View -->
        <div id="view-upload" class="grid lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="glass-card p-8 rounded-3xl shadow-xl space-y-5">
                    <h2 class="font-black text-lg flex items-center gap-2"><i data-lucide="settings-2" class="text-blue-600"></i> Metadata</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Academic Year</label>
                            <select id="up-year" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm shadow-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Class</label>
                            <select id="up-class" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm shadow-sm"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-2">Exam Category</label>
                            <select id="up-exam" class="w-full p-4 bg-white border border-slate-200 rounded-2xl outline-none focus:border-blue-500 transition-all font-bold text-sm shadow-sm"></select>
                        </div>
                    </div>
                </div>
                <div class="glass-card p-8 rounded-3xl shadow-xl text-center">
                    <h2 class="font-black text-lg mb-6 flex items-center justify-center gap-2"><i data-lucide="file-up" class="text-green-600"></i> Spreadsheet</h2>
                    <div class="border-2 border-dashed border-slate-200 rounded-2xl p-10 hover:border-blue-400 transition-all cursor-pointer relative group">
                        <input type="file" id="file-input" accept=".xlsx, .xls" class="absolute inset-0 opacity-0 cursor-pointer">
                        <i data-lucide="upload-cloud" class="w-12 h-12 text-slate-300 mx-auto mb-4 group-hover:text-blue-500 transition-colors"></i>
                        <p class="text-xs font-black text-slate-600 uppercase">Drop Excel File</p>
                    </div>
                </div>
            </div>
            
            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-3xl shadow-xl flex flex-col min-h-[550px] overflow-hidden">
                    <div class="p-6 border-b flex justify-between items-center bg-white/30">
                        <h2 class="font-black uppercase text-sm tracking-widest text-slate-800">Live Preview</h2>
                        <button id="publish-btn" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest hidden shadow-2xl shadow-blue-200 btn-hover">Publish Dataset</button>
                    </div>
                    <div id="preview-container" class="p-6 flex-grow overflow-auto custom-scrollbar italic text-slate-400 text-center flex items-center justify-center">
                        Select an Excel file to see the data preview here.
                    </div>
                </div>
            </div>
        </div>

        <!-- Manage View -->
        <div id="view-manage" class="hidden glass-card rounded-3xl shadow-xl overflow-hidden">
            <div class="p-6 border-b bg-white/30 flex justify-between items-center">
                <h2 class="font-black uppercase text-sm tracking-widest">Active Records</h2>
                <button id="refresh-btn" class="text-blue-600 text-xs font-black uppercase flex items-center gap-2 btn-hover"><i data-lucide="rotate-cw" class="w-3 h-3"></i> Refresh</button>
            </div>
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left min-w-[800px]">
                    <thead class="bg-slate-50/50 border-b">
                        <tr>
                            <th class="px-8 py-5 font-black text-slate-400 text-[10px] uppercase tracking-widest">Publication Details</th>
                            <th class="px-8 py-5 font-black text-slate-400 text-[10px] uppercase tracking-widest text-right">Operations</th>
                        </tr>
                    </thead>
                    <tbody id="manage-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Global Modal for View Record -->
    <div id="view-modal" class="fixed inset-0 z-[100] bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 sm:p-10">
        <div class="bg-white w-full max-w-7xl max-h-[90vh] rounded-3xl shadow-2xl flex flex-col overflow-hidden">
            <div class="p-6 sm:p-8 border-b flex items-center justify-between bg-slate-50">
                <div class="min-w-0">
                    <h3 id="modal-title" class="text-lg sm:text-2xl font-black text-slate-900 truncate uppercase">Record Preview</h3>
                    <p id="modal-subtitle" class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase mt-1 tracking-widest"></p>
                </div>
                <button id="close-modal" class="p-3 hover:bg-slate-200 rounded-2xl transition-all btn-hover"><i data-lucide="x" class="w-6 h-6"></i></button>
            </div>
            <div id="modal-content" class="flex-grow overflow-auto p-4 sm:p-8 custom-scrollbar"></div>
        </div>
    </div>

    <script type="module">
        import { auth, db, doc, setDoc, serverTimestamp, onAuthStateChanged, signOut, collection, getDocs, deleteDoc } from './firebase-config.js';
        import { renderNavbar } from './components.js';

        const YEAR_OPTIONS = ["2023", "2024", "2025", "2026", "2027"];
        const CLASS_OPTIONS = Array.from({ length: 12 }, (_, i) => `Class ${i + 1}`);
        const EXAM_OPTIONS = ["First Terminal", "Second Terminal", "Mid-term Examination", "Final Examination", "Unit Test 1", "Unit Test 2", "Pre-Test", "Test Examination"];

        function populateOptions() {
            document.getElementById('up-year').innerHTML = YEAR_OPTIONS.map(opt => `<option value="${opt}" ${opt === '2024' ? 'selected' : ''}>${opt}</option>`).join('');
            document.getElementById('up-class').innerHTML = CLASS_OPTIONS.map(opt => `<option value="${opt}" ${opt === 'Class 10' ? 'selected' : ''}>${opt}</option>`).join('');
            document.getElementById('up-exam').innerHTML = EXAM_OPTIONS.map(opt => `<option value="${opt}" ${opt === 'Final Examination' ? 'selected' : ''}>${opt}</option>`).join('');
        }
        populateOptions();

        let excelData = [], headers = [], recordsMap = new Map();

        onAuthStateChanged(auth, user => {
            if (!user) window.location.href = 'Login.html';
            document.getElementById('nav-container').innerHTML = '';
            document.getElementById('nav-container').appendChild(renderNavbar(user));
            lucide.createIcons();
            document.getElementById('nav-logout-btn').onclick = () => signOut(auth).then(() => window.location.href = 'Login.html');
        });

        const tUpload = document.getElementById('tab-upload'), tManage = document.getElementById('tab-manage'), vUpload = document.getElementById('view-upload'), vManage = document.getElementById('view-manage');
        
        tUpload.onclick = () => {
            tUpload.className = "px-8 py-2.5 rounded-xl font-black bg-white text-blue-600 shadow-xl shadow-slate-200/50 text-xs uppercase tracking-widest transition-all";
            tManage.className = "px-8 py-2.5 rounded-xl font-black text-slate-500 hover:text-slate-800 text-xs uppercase tracking-widest transition-all";
            vUpload.classList.remove('hidden'); vManage.classList.add('hidden');
        };

        tManage.onclick = () => {
            tManage.className = "px-8 py-2.5 rounded-xl font-black bg-white text-blue-600 shadow-xl shadow-slate-200/50 text-xs uppercase tracking-widest transition-all";
            tUpload.className = "px-8 py-2.5 rounded-xl font-black text-slate-500 hover:text-slate-800 text-xs uppercase tracking-widest transition-all";
            vManage.classList.remove('hidden'); vUpload.classList.add('hidden');
            fetchRecords();
        };

        document.getElementById('file-input').onchange = (e) => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const bstr = evt.target.result;
                const wb = XLSX.read(bstr, { type: 'binary' });
                const ws = wb.Sheets[wb.SheetNames[0]];
                excelData = XLSX.utils.sheet_to_json(ws);
                headers = XLSX.utils.sheet_to_json(ws, { header: 1 })[0];
                renderPreview();
            };
            reader.readAsBinaryString(file);
        };

        function renderPreview() {
            const cont = document.getElementById('preview-container');
            const orderedHeaders = getOrderedHeaders(headers, excelData);
            cont.innerHTML = `
                <div class="border rounded-2xl overflow-hidden shadow-sm">
                    <table class="w-full text-left text-[10px] min-w-max border-collapse">
                        <thead class="bg-slate-50 sticky top-0 font-black uppercase text-slate-400">
                            <tr>${orderedHeaders.map(h => `<th class="px-5 py-3 border-r">${h}</th>`).join('')}</tr>
                        </thead>
                        <tbody class="divide-y">
                            ${excelData.map(row => `<tr>${orderedHeaders.map(h => `<td class="px-5 py-2.5 border-r text-slate-600 font-bold">${row[h] || '-'}</td>`).join('')}</tr>`).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            cont.classList.remove('italic', 'flex', 'items-center', 'justify-center');
            document.getElementById('publish-btn').classList.remove('hidden');
        }

        function getOrderedHeaders(h, d) {
            const allKeys = h || (d[0] ? Object.keys(d[0]) : []);
            const primaryFields = ['Roll No', 'Roll', 'ID', 'Student ID', 'Name', 'Student Name', 'Student'];
            const summaryFields = ['Total', 'Total Marks', 'Percentage', 'Average', 'Avg', 'Grade', 'GPA', 'Result', 'Status'];
            return [
                ...allKeys.filter(k => primaryFields.some(p => k.toLowerCase().includes(p.toLowerCase()))),
                ...allKeys.filter(k => !primaryFields.some(p => k.toLowerCase().includes(p.toLowerCase())) && !summaryFields.some(s => k.toLowerCase().includes(s.toLowerCase()))).sort(),
                ...allKeys.filter(k => summaryFields.some(s => k.toLowerCase().includes(s.toLowerCase())))
            ];
        }

        document.getElementById('publish-btn').onclick = async () => {
            const year = document.getElementById('up-year').value;
            const className = document.getElementById('up-class').value;
            const examName = document.getElementById('up-exam').value;
            const docId = `${year}_${className}_${examName}`;
            
            try {
                await setDoc(doc(db, "results", docId), { year, className, examName, data: excelData, headers, createdAt: serverTimestamp() });
                alert("Record published successfully!");
                location.reload();
            } catch(e) {
                alert("Error: " + e.message);
            }
        };

        async function fetchRecords() {
            const snap = await getDocs(collection(db, "results"));
            const tbody = document.getElementById('manage-table-body');
            tbody.innerHTML = '';
            recordsMap.clear();
            
            snap.forEach(d => {
                const data = d.data();
                recordsMap.set(d.id, data);
                const tr = document.createElement('tr');
                tr.className = "hover:bg-blue-50/40 transition-colors group";
                tr.innerHTML = `
                    <td class="px-8 py-6">
                        <div class="font-black text-slate-800 uppercase tracking-tight text-base">${data.examName}</div>
                        <div class="text-[10px] text-slate-400 font-black uppercase tracking-widest mt-1.5">${data.year} • ${data.className} • ${data.data.length} Students</div>
                    </td>
                    <td class="px-8 py-6 text-right space-x-3">
                        <button onclick="window.viewRecord('${d.id}')" class="bg-blue-50 text-blue-600 text-[10px] font-black uppercase px-6 py-2.5 rounded-xl hover:bg-blue-600 hover:text-white transition-all btn-hover">View</button>
                        <button onclick="window.exportRecord('${d.id}')" class="bg-green-50 text-green-600 text-[10px] font-black uppercase px-6 py-2.5 rounded-xl hover:bg-green-600 hover:text-white transition-all btn-hover">Export</button>
                        <button onclick="window.deleteRecord('${d.id}')" class="bg-red-50 text-red-500 text-[10px] font-black uppercase px-6 py-2.5 rounded-xl hover:bg-red-500 hover:text-white transition-all btn-hover">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        window.viewRecord = (id) => {
            const rec = recordsMap.get(id);
            const modal = document.getElementById('view-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-title').innerText = rec.examName;
            document.getElementById('modal-subtitle').innerText = `${rec.year} • ${rec.className}`;
            
            const orderedKeys = getOrderedHeaders(rec.headers, rec.data);

            content.innerHTML = `
                <div class="overflow-x-auto custom-scrollbar border border-slate-100 rounded-2xl shadow-sm">
                    <table class="w-full text-left text-[11px] min-w-max border-collapse">
                        <thead class="bg-slate-100 font-black uppercase sticky top-0 z-10 text-slate-500">
                            <tr>${orderedKeys.map(c => `<th class="px-6 py-4 border-b border-r border-slate-200">${c}</th>`).join('')}</tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100">
                            ${rec.data.map((row, idx) => `
                                <tr class="${idx % 2 === 0 ? 'bg-white' : 'bg-slate-50/30'}">
                                    ${orderedKeys.map(c => `<td class="px-6 py-3 border-r border-slate-100 text-slate-600 font-bold">${row[c] !== undefined ? row[c] : '-'}</td>`).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
            modal.classList.remove('hidden');
        };

        window.exportRecord = (id) => {
            const rec = recordsMap.get(id);
            const orderedKeys = getOrderedHeaders(rec.headers, rec.data);
            const worksheetData = rec.data.map(row => {
                const orderedRow = {};
                orderedKeys.forEach(k => orderedRow[k] = row[k] || '');
                return orderedRow;
            });
            const ws = XLSX.utils.json_to_sheet(worksheetData, { header: orderedKeys });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Results");
            XLSX.writeFile(wb, `${id}.xlsx`);
        };

        document.getElementById('close-modal').onclick = () => document.getElementById('view-modal').classList.add('hidden');

        window.deleteRecord = async (id) => {
            if(confirm(`Are you sure you want to delete this dataset?`)) {
                await deleteDoc(doc(db, "results", id));
                fetchRecords();
            }
        };

        document.getElementById('refresh-btn').onclick = fetchRecords;
    </script>
</body>
</html>
