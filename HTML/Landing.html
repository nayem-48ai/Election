
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduResult - Search Result</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fcfcfd; }
        .glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.4); }
        @media print {
            body * { visibility: hidden !important; }
            #printable-area, #printable-area * { visibility: visible !important; }
            #printable-area { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
        }
        .fade-in { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="nav-container"></div>

    <main class="flex-grow container mx-auto px-4 py-12 max-w-6xl">
        <div id="search-section" class="fade-in no-print">
            <div class="text-center mb-16">
                <h1 class="text-4xl sm:text-6xl font-black text-slate-900 mb-6 tracking-tighter">Academic <span class="text-blue-600">Dashboard</span></h1>
                <p class="text-slate-500 max-w-xl mx-auto font-medium leading-relaxed">Instantly access your examination performance data. Enter your academic credentials to generate your digital transcript.</p>
            </div>

            <div class="grid lg:grid-cols-2 gap-16 items-center">
                <div class="glass-card p-10 rounded-[3rem] shadow-2xl space-y-6">
                    <div class="grid grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block px-1">Academic Year</label>
                            <select id="year-select" class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-bold text-sm appearance-none"></select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block px-1">Assigned Class</label>
                            <select id="class-select" class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-bold text-sm appearance-none"></select>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block px-1">Examination Category</label>
                        <select id="exam-select" class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-bold text-sm appearance-none"></select>
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest block px-1">Student Roll / ID</label>
                        <input type="text" id="roll-input" placeholder="e.g. 102204" class="w-full p-4 bg-white/50 border border-slate-200 rounded-2xl focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all font-bold">
                    </div>
                    <button id="search-btn" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black shadow-2xl hover:bg-slate-800 transition-all active:scale-95 flex items-center justify-center gap-3">
                        <i data-lucide="scan-text" class="w-6 h-6"></i> FETCH MARKSHEET
                    </button>
                </div>
                
                <div class="hidden lg:block space-y-8">
                    <div class="glass-card p-8 rounded-3xl shadow-xl -rotate-2 transform hover:rotate-0 transition-all duration-500">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-blue-100 rounded-2xl flex items-center justify-center text-blue-600"><i data-lucide="cpu" class="w-7 h-7"></i></div>
                            <div><h3 class="font-black text-slate-800 tracking-tight">Rapid Fetch</h3><p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Instant Data Retrieval</p></div>
                        </div>
                    </div>
                    <div class="glass-card p-8 rounded-3xl shadow-xl rotate-3 ml-12 transform hover:rotate-0 transition-all duration-500">
                        <div class="flex items-center gap-5">
                            <div class="w-14 h-14 bg-green-100 rounded-2xl flex items-center justify-center text-green-600"><i data-lucide="printer" class="w-7 h-7"></i></div>
                            <div><h3 class="font-black text-slate-800 tracking-tight">Print Optimized</h3><p class="text-xs font-bold text-slate-400 uppercase tracking-wider">Perfect A4 Formatting</p></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-view" class="hidden max-w-5xl mx-auto space-y-8 fade-in">
            <div class="flex justify-between items-center no-print px-4">
                <button onclick="location.reload()" class="flex items-center gap-2 text-slate-400 hover:text-blue-600 font-black text-xs uppercase tracking-widest"><i data-lucide="chevron-left" class="w-5 h-5"></i> Back to search</button>
                <button onclick="window.print()" class="bg-green-600 text-white px-8 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl shadow-green-200 hover:bg-green-700 active:scale-95 flex items-center gap-2 transition-all"><i data-lucide="printer" class="w-4 h-4"></i> Download PDF</button>
            </div>
            <div id="printable-area"></div>
        </div>
    </main>

    <script type="module">
        import { auth, db, collection, getDocs, doc, getDoc, onAuthStateChanged, signOut } from './firebase-config.js';
        import { renderNavbar, renderMarksheet } from './components.js';

        onAuthStateChanged(auth, user => {
            const nav = renderNavbar(user);
            document.getElementById('nav-container').appendChild(nav);
            lucide.createIcons();
            if(user) document.getElementById('nav-logout-btn').onclick = () => signOut(auth).then(() => location.reload());
        });

        const yearsSet = new Set(), classesSet = new Set(), examsSet = new Set();
        getDocs(collection(db, "results")).then(snap => {
            snap.forEach(doc => {
                const d = doc.data();
                yearsSet.add(d.year); classesSet.add(d.className); examsSet.add(d.examName);
            });
            populate('year-select', [...yearsSet].sort().reverse());
            populate('class-select', [...classesSet].sort());
            populate('exam-select', [...examsSet].sort());
        });

        const populate = (id, items) => {
            document.getElementById(id).innerHTML = '<option value="">Select</option>' + items.map(i => `<option value="${i}">${i}</option>`).join('');
        };

        document.getElementById('search-btn').onclick = async () => {
            const y = document.getElementById('year-select').value, c = document.getElementById('class-select').value, e = document.getElementById('exam-select').value, roll = document.getElementById('roll-input').value;
            if(!y || !c || !e || !roll) return alert("All fields are mandatory.");

            const snap = await getDoc(doc(db, "results", `${y}_${c}_${e}`));
            if(snap.exists()) {
                const results = snap.data();
                const found = results.data.find(r => String(r['Roll No'] || r['ID'] || r['Roll']).toLowerCase() === roll.toLowerCase());
                if(found) {
                    document.getElementById('search-section').classList.add('hidden');
                    document.getElementById('result-view').classList.remove('hidden');
                    document.getElementById('printable-area').innerHTML = renderMarksheet(found, results);
                    lucide.createIcons();
                } else alert("Roll number not found.");
            } else alert("Result dataset not published yet.");
        };
    </script>
</body>
</html>
